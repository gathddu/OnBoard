spring.application.name=api-gateway
server.port=8083

beneficiarios.service.url=http://localhost:8081
consulta.service.url=http://localhost:8082

spring.cloud.gateway.server.webmvc.routes[0].id=beneficiarios-all
spring.cloud.gateway.server.webmvc.routes[0].uri=${beneficiarios.service.url}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/beneficiarios/**

spring.cloud.gateway.server.webmvc.routes[1].id=consulta-read
spring.cloud.gateway.server.webmvc.routes[1].uri=${consulta.service.url}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/consulta/**
